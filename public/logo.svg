<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Wintrich.Tech">
  <defs>
    <linearGradient id="wt-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="60%" stop-color="#7C9CFF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="wt-glow" cx="32" cy="32" r="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft glow -->
  <circle cx="32" cy="32" r="30" fill="url(#wt-glow)"/>

  <!-- orbital ring -->
  <circle cx="32" cy="32" r="27" stroke="url(#wt-grad)" stroke-opacity="0.35" stroke-width="1"/>

  <!-- W shape made of connected nodes -->
  <g stroke="url(#wt-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M14 20 L22 44 L32 28 L42 44 L50 20"/>
  </g>

  <!-- nodes -->
  <g fill="#0A0F1A" stroke="url(#wt-grad)" stroke-width="2.2">
    <circle cx="14" cy="20" r="3.2"/>
    <circle cx="22" cy="44" r="3.2"/>
    <circle cx="32" cy="28" r="3.2"/>
    <circle cx="42" cy="44" r="3.2"/>
    <circle cx="50" cy="20" r="3.2"/>
  </g>

  <!-- accent node center -->
  <circle cx="32" cy="28" r="1.5" fill="#22D3EE"/>
</svg>
